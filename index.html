<!doctype html>
<html lang="sq">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DUA CRYPTO</title>
    <style>
      :root {
        --bg: #000000;
        --green-1: #5fbf43;
        --green-2: #8cd057;
        --green-3: #437f2f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      }

      .logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }

      .mark {
        width: min(28vw, 150px);
        aspect-ratio: 1 / 1;
        border-radius: 999px 999px 0 0;
        background:
          radial-gradient(circle at 18% 65%, transparent 24%, #000 25%),
          radial-gradient(circle at 50% 66%, transparent 24%, #000 25%),
          radial-gradient(circle at 82% 65%, transparent 24%, #000 25%),
          radial-gradient(circle at 50% 100%, #000 44%, transparent 45%),
          conic-gradient(
            from 180deg,
            var(--green-1) 0deg 35deg,
            var(--green-2) 35deg 62deg,
            var(--green-1) 62deg 95deg,
            var(--green-3) 95deg 122deg,
            var(--green-1) 122deg 150deg,
            var(--green-2) 150deg 180deg,
            var(--green-1) 180deg
          );
        position: relative;
        overflow: hidden;
      }

      .mark span {
        position: absolute;
        left: 50%;
        top: 55%;
        transform: translate(-50%, -50%) rotate(6deg);
        color: #1d3e16;
        font-size: clamp(2.6rem, 8vw, 4.2rem);
        line-height: 1;
      }

      h1 {
        margin: 0;
        color: var(--green-1);
        letter-spacing: 0.08em;
        font-size: clamp(2rem, 5vw, 3.25rem);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="logo-wrap" aria-label="DUA CRYPTO landing page">
      <div class="mark" role="img" aria-label="Logo DUA CRYPTO me simbolin Bitcoin">
        <span>₿</span>
      </div>
      <h1>DUA CRYPTO</h1>
    </main>
  </body>
</html>
