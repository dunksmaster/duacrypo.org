<!doctype html>
<html lang="sq">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DuaCrypo - Kategoritë</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        color: #1f2937;
        margin: 0;
      }
      .container {
        max-width: 820px;
        margin: 48px auto;
        padding: 0 20px;
      }
      h1 {
        margin-bottom: 8px;
      }
      .subtitle {
        color: #4b5563;
        margin-bottom: 28px;
      }
      .category-card {
        display: block;
        text-decoration: none;
        background: #ffffff;
        border-radius: 12px;
        padding: 22px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .category-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.1);
      }
      .category-title {
        color: #111827;
        font-size: 1.1rem;
        margin: 0 0 6px;
      }
      .category-text {
        color: #374151;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Kategoritë Kryesore</h1>
      <p class="subtitle">Zgjidhni një kategori për të parë udhëzuesin e plotë.</p>

      <a class="category-card" href="duhet-te-shes-fitimet.html">
        <h2 class="category-title">Duhet të shes fitimet për të tërhequr?</h2>
        <p class="category-text">
          Hape këtë kategori për hapat e tërheqjes së fitimeve nga Binance dhe CEX.IO.
        </p>
      </a>
    </main>
  </body>
</html>
