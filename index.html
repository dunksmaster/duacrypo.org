<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investime nÃ« Kriptomonedha â Strategji dhe KÃ«shilla</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --surface: #0b1121;
    --surface2: #111a30;
    --accent: #f0c040;
    --accent2: #4af0b0;
    --accent3: #f06040;
    --text: #e8edf8;
    --muted: #6a7a9a;
    --border: rgba(240,192,64,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s ease;
    mix-blend-mode: difference;
  }
  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transition: all 0.18s ease;
    opacity: 0.5;
  }

  /* Grid noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Animated gradient orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
    animation: orb-drift 20s ease-in-out infinite alternate;
  }
  .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #f0c040, transparent); top: -150px; left: -100px; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #4af0b0, transparent); bottom: -100px; right: -100px; animation-delay: -7s; }
  .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #f06040, transparent); top: 50%; left: 60%; animation-delay: -14s; }
  @keyframes orb-drift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(30px, 40px) scale(1.1); } }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    background: linear-gradient(to bottom, rgba(5,8,16,0.9), transparent);
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: 0.05em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--text); }
  nav ul { list-style: none; display: flex; gap: 36px; }
  nav ul a {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  nav ul a:hover { color: var(--accent); }

  /* SECTIONS */
  section { position: relative; z-index: 1; }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px 48px 80px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .hero-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity: 0;
    animation: fade-up 0.8s 0.2s forwards;
  }
  .hero-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(3.2rem, 7vw, 7rem);
    line-height: 0.95;
    letter-spacing: -0.02em;
    margin-bottom: 32px;
    opacity: 0;
    animation: fade-up 0.8s 0.4s forwards;
  }
  .hero-title .line-gold { color: var(--accent); display: block; }
  .hero-title .line-green { color: var(--accent2); display: block; }
  .hero-sub {
    font-size: 1.1rem;
    color: var(--muted);
    max-width: 520px;
    line-height: 1.7;
    font-weight: 300;
    margin-bottom: 48px;
    opacity: 0;
    animation: fade-up 0.8s 0.6s forwards;
  }
  .hero-cta {
    display: flex;
    gap: 16px;
    opacity: 0;
    animation: fade-up 0.8s 0.8s forwards;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .btn-primary {
    background: var(--accent);
    color: #050810;
  }
  .btn-primary:hover {
    background: #fff;
    transform: translate(-2px, -3px);
    box-shadow: 4px 6px 0 var(--accent);
  }
  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1.5px solid rgba(232,237,248,0.2);
  }
  .btn-outline:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* TICKER */
  .ticker-wrap {
    overflow: hidden;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
    margin-bottom: 0;
  }
  .ticker {
    display: flex;
    gap: 0;
    animation: ticker 30s linear infinite;
    white-space: nowrap;
  }
  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 40px;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    border-right: 1px solid var(--border);
  }
  .ticker-item .symbol { color: var(--text); font-weight: 700; }
  .ticker-item .up { color: var(--accent2); }
  .ticker-item .down { color: var(--accent3); }
  @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
</style>
</head>
<body>
<h1>truncated</h1>
</body>
</html>
